# References registry for the About page + Stage-6 build-time link check.
#
# Each entry is HEAD-checked by `src/ohbm2026/ui_data/link_check.py` during
# the deploy build (T086 + T088). 4xx / 5xx / timeout → non-zero exit →
# CI fails the deploy. Update entries here when a paper moves / a model
# card gets a new URL; do not let drift accumulate.
#
# `section` groups references by pipeline stage so the about page can
# render them under the matching deep-dive without hard-coding.

