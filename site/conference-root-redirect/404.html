<!DOCTYPE html>
<!--
  Stage 9 + Stage 15 (spec 015-neuroscape-context): smart root 404.

  gh-pages serves a SINGLE `404.html` from the publishing-source root
  for every path that doesn't resolve to a static file. With the
  Stage 15 three-mode deployment (`/`, `/ohbm2026/`, `/neuroscape/`),
  this single file has to hand a deep-linked request off to the RIGHT
  per-mode SvelteKit shell:

  1. **Path inside `/ohbm2026/`** (e.g. `<host>/ohbm2026/abstract/<n>/`) →
     bounce to `<host>/ohbm2026/?spa=<encoded-original-path>`. The
     OHBM 2026 SvelteKit shell at `/ohbm2026/index.html` boots, reads
     `?spa=` in `+layout.svelte`'s `onMount`, and `goto`s the deep link.

  2. **Path inside `/neuroscape/`** (e.g.
     `<host>/neuroscape/abstract/<pubmed_id>/`) → bounce to
     `<host>/neuroscape/?spa=…`. Same SvelteKit handoff, different
     bundle.

  3. **Path inside the atlas-root deploy** (e.g. `<host>/some-random/`)
     — no subroutes exist there yet, so bounce to the atlas-root home.

  PR previews add a `/pr-<N>/` prefix and the legacy staging used
  `/sandbox/` — both have to be honoured in every branch. The prefix
  is detected from the request URL so the SAME file works at the
  gh-pages root, at every per-PR root, and at the sandbox root.

  Relative paths like `./neuroscape/` are NOT safe here — the browser
  resolves them against the REQUEST URL, not the file's gh-pages
  location. Absolute paths composed from the detected prefix are
  correct in every case.
-->
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Abstract Atlas — locating your page</title>
	<meta name="robots" content="noindex">
	<script>
		(function () {
			var p = window.location.pathname;
			var search = window.location.search;
			var hash = window.location.hash;
			// Detect the prefix the user landed under (per-PR preview or
			// the legacy sandbox staging root) so absolute redirects
			// compose correctly.
			var prefixMatch = p.match(/^(\/(?:pr-\d+|sandbox))\//);
			var prefix = prefixMatch ? prefixMatch[1] : '';

			// LOOP SAFETY: if we got here AFTER already issuing a
			// `?spa=` redirect to the same subsite shell, the target
			// SvelteKit bundle isn't deployed in this environment
			// (e.g. /neuroscape/ exists in PR-preview but not on
			// production until the spec-015 site code lands).
			// Re-redirecting would loop forever. Detect that case and
			// fall through to the safe atlas-root home instead.
			var alreadyRedirected = /[?&]spa=/.test(search);

			// 1. Inside /neuroscape/ → bounce to that bundle's SPA shell.
			var ns = p.match(/^(\/(?:pr-\d+|sandbox))?\/neuroscape\//);
			if (ns && !alreadyRedirected) {
				var nsBase = (ns[1] || '') + '/neuroscape';
				var stash = p + search + hash;
				try { sessionStorage.setItem('ohbm2026.spa.redirect', stash); } catch (e) {}
				window.location.replace(nsBase + '/?spa=' + encodeURIComponent(stash));
				return;
			}

			// 2. Inside /ohbm2026/ → bounce to that bundle's SPA shell.
			var m = p.match(/^(\/(?:pr-\d+|sandbox))?\/ohbm2026\//);
			if (m && !alreadyRedirected) {
				var base = (m[1] || '') + '/ohbm2026';
				var stash2 = p + search + hash;
				try { sessionStorage.setItem('ohbm2026.spa.redirect', stash2); } catch (e) {}
				window.location.replace(base + '/?spa=' + encodeURIComponent(stash2));
				return;
			}

			// 3. Outside any known subsite — OR a loop-safety fall-
			// through — bounce to the atlas-root home for the current
			// prefix. Trailing slash matters because gh-pages serves
			// the root index from `/`, not `''`.
			window.location.replace((prefix || '') + '/' + search + hash);
		})();
	</script>
	<!-- No-JS fallback: a 2-second meta-refresh + a manual link to
	     each subsite. Deep-link recovery requires JS and is best-effort. -->
	<meta http-equiv="refresh" content="2; url=/">
</head>
<body>
	<noscript>
		<p>Page not found. Try one of:</p>
		<ul>
			<li><a href="/">Cross-conference atlas</a></li>
			<li><a href="/ohbm2026/">OHBM 2026 Atlas</a></li>
			<li><a href="/neuroscape/">NeuroScape PubMed Atlas</a></li>
		</ul>
	</noscript>
</body>
</html>
