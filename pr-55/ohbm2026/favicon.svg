<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Abstract Atlas">
  <!-- Transparent background. White-filled, dark-outlined map so the glyph
       reads on both light and dark browser tabs without a coloured tile. -->
  <g stroke="#334155" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- folded map paper (accordion fold: top/bottom edges zig-zag) -->
    <path d="M5 8 L12.3 6 L19 8 L27 6 L27 24 L19 26 L12.3 24 L5 26 Z" fill="#ffffff"/>
    <!-- fold creases -->
    <path d="M12.3 6 V24 M19 8 V26" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
  </g>
  <!-- location pin -->
  <path d="M16 10 a3.3 3.3 0 0 1 3.3 3.3 c0 2.4 -3.3 5.5 -3.3 5.5 s-3.3 -3.1 -3.3 -5.5 a3.3 3.3 0 0 1 3.3 -3.3 Z" fill="#ff5252" stroke="#b3262b" stroke-width="0.8" stroke-linejoin="round"/>
  <circle cx="16" cy="13.3" r="1.2" fill="#ffffff"/>
</svg>
