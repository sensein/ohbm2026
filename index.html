<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OHBM 2026 Abstract Atlas</title>
  <meta name="description" content="OHBM 2026 Abstract Atlas — coming soon.">
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --fg-muted: #4a4a4a;
      --bg: #fafafa;
      --accent: #2b5d8a;
    }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #ececec; --fg-muted: #a0a0a0; --bg: #121417; --accent: #7fb3e5; }
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    main { max-width: 36rem; text-align: center; }
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 0.75rem;
    }
    .accent { color: var(--accent); }
    p { font-size: 1.05rem; line-height: 1.55; color: var(--fg-muted); margin: 0.5rem 0; }
    .tag {
      display: inline-block;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-muted);
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="tag">Coming soon</div>
    <h1>OHBM 2026 <span class="accent">Abstract Atlas</span></h1>
    <p>A searchable, navigable map of accepted abstracts for the OHBM 2026 Annual Meeting.</p>
    <p>Check back closer to the meeting.</p>
  </main>
</body>
</html>
